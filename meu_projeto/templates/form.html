{% extends 'base.html' %}
{% block content %}
    <h1>{{ action }} Produto</h1>
    
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label>Nome:</label>
            <input type="text" name="name" value="{{ product.name if product else '' }}" required>
        </div>

        <div class="form-group">
            <label>Preço:</label>
            <input type="number" step="0.01" name="price" value="{{ product.price if product else '' }}" required>
        </div>

        <div class="form-group">
            <label>Imagem do Produto:</label>
            <input type="file" name="image" id="image-input" accept="image/*" {% if not product %}required{% endif %}>
            
            <div class="preview-container">
                <p><small>Pré-visualização:</small></p>
                <img id="image-preview" 
                     src="{{ url_for('static', filename='uploads/' + product.image) if product else '#' }}" 
                     alt="Preview" 
                     style="display: {{ 'block' if product else 'none' }};">
            </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Salvar Produto</button>
    </form>

    <script>
        // Lógica de Preview
        const imageInput = document.getElementById('image-input');
        const imagePreview = document.getElementById('image-preview');

        imageInput.onchange = evt => {
            const [file] = imageInput.files;
            if (file) {
                // Cria uma URL temporária para o arquivo selecionado
                imagePreview.src = URL.createObjectURL(file);
                imagePreview.style.display = 'block';
            }
        }
    </script>
{% endblock %}
