<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏍️ Sistema de Motocicletas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 30px; }
        header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .card { background: white; border-radius: 15px; padding: 25px; margin-bottom: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .card h2 { color: #667eea; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #eee; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: bold; color: #555; margin-bottom: 5px; }
        input, select { padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: all 0.3s; margin: 5px; }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; }
        .btn-success { background: #27ae60; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-secondary { background: #95a5a6; color: white; }
        .search-section { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-section input { flex: 1; min-width: 200px; }
        .motos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .moto-card { background: #f8f9fa; border-radius: 12px; overflow: hidden; border: 2px solid #e9ecef; transition: transform 0.3s; }
        .moto-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .moto-image { width: 100%; height: 200px; object-fit: cover; background: #ddd; }
        .moto-info { padding: 15px; }
        .moto-info h3 { color: #333; margin-bottom: 10px; }
        .moto-price { color: #27ae60; font-size: 1.3em; font-weight: bold; margin-top: 10px; }
        .moto-actions { display: flex; gap: 10px; padding: 15px; background: white; border-top: 1px solid #eee; }
        .empty-state { text-align: center; padding: 40px; color: #999; }
        .loading { text-align: center; padding: 40px; color: #667eea; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 10px; text-align: center; }
        .stat-value { font-size: 2em; font-weight: bold; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; }
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 2000; }
        .toast { padding: 15px 25px; border-radius: 8px; color: white; font-weight: bold; margin-bottom: 10px; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast.success { background: #27ae60; }
        .toast.error { background: #e74c3c; }
        .image-preview { max-width: 100%; max-height: 200px; margin-top: 10px; border-radius: 8px; display: none; }
        .image-preview.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏍️ Sistema de Motocicletas</h1>
            <p>Cadastro e consulta de motos via API</p>
        </header>

        <div class="stats-grid" id="statsContainer">
            <div class="stat-card"><div class="stat-value" id="statTotal">0</div><div>Total de Motos</div></div>
            <div class="stat-card"><div class="stat-value" id="statMarcas">0</div><div>Marcas</div></div>
            <div class="stat-card"><div class="stat-value" id="statMedia">R$ 0</div><div>Valor Médio</div></div>
        </div>

        <div class="card">
            <h2>➕ Cadastrar Nova Moto</h2>
            <form id="formCadastro">
                <div class="form-grid">
                    <div class="form-group"><label>Marca *</label><input type="text" id="cadMarca" required placeholder="Honda, Yamaha..."></div>
                    <div class="form-group"><label>Modelo *</label><input type="text" id="cadModelo" required placeholder="CB 500, MT-07..."></div>
                    <div class="form-group"><label>Ano</label><input type="number" id="cadAno" placeholder="2024"></div>
                    <div class="form-group"><label>Consumo (km/l)</label><input type="number" id="cadConsumo" step="0.1" placeholder="25.5"></div>
                    <div class="form-group"><label>Valor (R$)</label><input type="number" id="cadValor" step="0.01" placeholder="35000.00"></div>
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>Foto da Moto</label>
                        <input type="file" id="cadImagem" accept="image/*" onchange="previewImage(this, 'previewCadastro')">
                        <img id="previewCadastro" class="image-preview">
                    </div>
                </div>
                <div style="margin-top: 20px;">
                    <button type="submit" class="btn btn-primary">💾 Cadastrar</button>
                    <button type="reset" class="btn btn-secondary" onclick="limparPreview('previewCadastro')">Limpar</button>
                </div>
            </form>
        </div>

        <div class="card">
            <h2>🔍 Consultar Motos</h2>
            <div class="search-section">
                <input type="text" id="buscaModelo" placeholder="Buscar por modelo..." onkeyup="buscarComDelay()">
                <select id="filtroMarca" onchange="buscarMotos()"><option value="">Todas as marcas</option></select>
                <button onclick="buscarMotos()" class="btn btn-success">🔍 Buscar</button>
                <button onclick="listarTodas()" class="btn btn-secondary">📋 Todas</button>
            </div>
            <div id="resultados"><div class="loading">Carregando...</div></div>
        </div>
    </div>

    <div id="modalEditar" class="modal" onclick="fecharModalFora(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header"><h2>✏️ Editar Moto</h2><button class="close-btn" onclick="fecharModal()">&times;</button></div>
            <form id="formEditar">
                <input type="hidden" id="editId">
                <div class="form-grid">
                    <div class="form-group"><label>Marca</label><input type="text" id="editMarca" required></div>
                    <div class="form-group"><label>Modelo</label><input type="text" id="editModelo" required></div>
                    <div class="form-group"><label>Ano</label><input type="number" id="editAno"></div>
                    <div class="form-group"><label>Consumo</label><input type="number" id="editConsumo" step="0.1"></div>
                    <div class="form-group"><label>Valor</label><input type="number" id="editValor" step="0.01"></div>
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>Nova Imagem (opcional)</label>
                        <input type="file" id="editImagem" accept="image/*" onchange="previewImage(this, 'previewEditar')">
                        <img id="imagemAtual" class="image-preview" style="max-height: 150px;">
                        <img id="previewEditar" class="image-preview">
                    </div>
                </div>
                <div style="margin-top: 20px;">
                    <button type="submit" class="btn btn-primary">💾 Salvar</button>
                    <button type="button" onclick="fecharModal()" class="btn btn-secondary">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ============================================
        // IP AUTOMÁTICO - FUNCIONA COM QUALQUER IP!
        // ============================================
        const SERVIDOR_IP = window.location.hostname;
        const API_URL = `http://${SERVIDOR_IP}:3000/api`;
        
        console.log('🚀 Conectando à API:', API_URL);

        let buscaTimeout;

        document.addEventListener('DOMContentLoaded', () => {
            carregarDados();
            carregarMarcas();
        });

        async function carregarDados() {
            try {
                const [motosRes, statsRes] = await Promise.all([
                    fetch(`${API_URL}/motos`),
                    fetch(`${API_URL}/estatisticas`)
                ]);
                
                if (!motosRes.ok) throw new Error(`HTTP ${motosRes.status}`);
                
                const motosData = await motosRes.json();
                const statsData = await statsRes.json();
                
                exibirMotos(motosData.motos);
                atualizarEstatisticas(statsData);
                
            } catch (erro) {
                console.error('Erro:', erro);
                document.getElementById('resultados').innerHTML = 
                    `<div class="empty-state">
                        <h3>❌ Erro de conexão</h3>
                        <p>API: ${API_URL}</p>
                        <button onclick="carregarDados()" class="btn btn-primary">🔄 Tentar</button>
                    </div>`;
            }
        }

        async function carregarMarcas() {
            try {
                const res = await fetch(`${API_URL}/marcas`);
                const data = await res.json();
                const select = document.getElementById('filtroMarca');
                select.innerHTML = '<option value="">Todas as marcas</option>';
                data.marcas.forEach(marca => select.innerHTML += `<option value="${marca}">${marca}</option>`);
            } catch (erro) { console.error('Erro marcas:', erro); }
        }

        document.getElementById('formCadastro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('marca', document.getElementById('cadMarca').value);
            formData.append('modelo', document.getElementById('cadModelo').value);
            formData.append('ano', document.getElementById('cadAno').value);
            formData.append('consumo', document.getElementById('cadConsumo').value);
            formData.append('valor', document.getElementById('cadValor').value);
            const imagem = document.getElementById('cadImagem').files[0];
            if (imagem) formData.append('imagem', imagem);

            try {
                const res = await fetch(`${API_URL}/motos`, { method: 'POST', body: formData });
                const data = await res.json();
                if (res.ok) {
                    mostrarToast('✅ Moto cadastrada!', 'success');
                    e.target.reset(); limparPreview('previewCadastro');
                    carregarDados(); carregarMarcas();
                } else mostrarToast(`❌ ${data.erro}`, 'error');
            } catch (erro) { mostrarToast('❌ Erro de conexão', 'error'); }
        });

        function buscarComDelay() { clearTimeout(buscaTimeout); buscaTimeout = setTimeout(buscarMotos, 300); }

        async function buscarMotos() {
            const modelo = document.getElementById('buscaModelo').value;
            const marca = document.getElementById('filtroMarca').value;
            let url = `${API_URL}/motos?`;
            if (modelo) url += `modelo=${encodeURIComponent(modelo)}&`;
            if (marca) url += `marca=${encodeURIComponent(marca)}&`;
            
            try {
                document.getElementById('resultados').innerHTML = '<div class="loading">Buscando...</div>';
                const res = await fetch(url);
                const data = await res.json();
                exibirMotos(data.motos);
            } catch (erro) { mostrarToast('Erro na busca', 'error'); }
        }

        function listarTodas() { document.getElementById('buscaModelo').value = ''; document.getElementById('filtroMarca').value = ''; carregarDados(); }

        function exibirMotos(motos) {
            const container = document.getElementById('resultados');
            if (!motos || motos.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>🏍️ Nenhuma moto encontrada</h3><p>Cadastre uma moto ou ajuste a busca</p></div>';
                return;
            }
            container.innerHTML = '<div class="motos-grid">' + 
                motos.map(moto => `
                    <div class="moto-card">
                        <img src="${moto.imagem || 'https://via.placeholder.com/300x200?text=Sem+Imagem'}" alt="${moto.modelo}" class="moto-image" onerror="this.src='https://via.placeholder.com/300x200?text=Sem+Imagem'">
                        <div class="moto-info">
                            <h3>${moto.marca} ${moto.modelo}</h3>
                            <p>ID: #${moto.id}</p>
                            ${moto.ano ? `<p>📅 ${moto.ano}</p>` : ''}
                            ${moto.consumo ? `<p>⛽ ${moto.consumo} km/l</p>` : ''}
                            <p class="moto-price">${moto.valor ? `R$ ${parseFloat(moto.valor).toLocaleString('pt-BR', {minimumFractionDigits: 2})}` : 'Valor não informado'}</p>
                        </div>
                        <div class="moto-actions">
                            <button onclick="abrirEditar(${moto.id})" class="btn btn-success">✏️ Editar</button>
                            <button onclick="deletarMoto(${moto.id})" class="btn btn-danger">🗑️ Excluir</button>
                        </div>
                    </div>
                `).join('') + '</div>';
        }

        function atualizarEstatisticas(stats) {
            document.getElementById('statTotal').textContent = stats.total;
            document.getElementById('statMarcas').textContent = Object.keys(stats.porMarca).length;
            document.getElementById('statMedia').textContent = 'R$ ' + (stats.valorMedio || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2});
        }

        async function abrirEditar(id) {
            try {
                const res = await fetch(`${API_URL}/motos/${id}`);
                const moto = await res.json();
                document.getElementById('editId').value = moto.id;
                document.getElementById('editMarca').value = moto.marca;
                document.getElementById('editModelo').value = moto.modelo;
                document.getElementById('editAno').value = moto.ano || '';
                document.getElementById('editConsumo').value = moto.consumo || '';
                document.getElementById('editValor').value = moto.valor || '';
                const imgAtual = document.getElementById('imagemAtual');
                if (moto.imagem) { imgAtual.src = moto.imagem; imgAtual.classList.add('show'); }
                else imgAtual.classList.remove('show');
                limparPreview('previewEditar'); document.getElementById('editImagem').value = '';
                document.getElementById('modalEditar').style.display = 'flex';
            } catch (erro) { mostrarToast('Erro ao carregar moto', 'error'); }
        }

        document.getElementById('formEditar').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const formData = new FormData();
            formData.append('marca', document.getElementById('editMarca').value);
            formData.append('modelo', document.getElementById('editModelo').value);
            formData.append('ano', document.getElementById('editAno').value);
            formData.append('consumo', document.getElementById('editConsumo').value);
            formData.append('valor', document.getElementById('editValor').value);
            const imagem = document.getElementById('editImagem').files[0];
            if (imagem) formData.append('imagem', imagem);

            try {
                const res = await fetch(`${API_URL}/motos/${id}`, { method: 'PUT', body: formData });
                const data = await res.json();
                if (res.ok) { mostrarToast('✅ Moto atualizada!', 'success'); fecharModal(); carregarDados(); carregarMarcas(); }
                else mostrarToast(`❌ ${data.erro}`, 'error');
            } catch (erro) { mostrarToast('❌ Erro ao atualizar', 'error'); }
        });

        async function deletarMoto(id) {
            if (!confirm('Tem certeza que deseja excluir esta moto?')) return;
            try {
                const res = await fetch(`${API_URL}/motos/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if (res.ok) { mostrarToast('🗑️ Moto excluída!', 'success'); carregarDados(); carregarMarcas(); }
                else mostrarToast(`❌ ${data.erro}`, 'error');
            } catch (erro) { mostrarToast('❌ Erro ao excluir', 'error'); }
        }

        function previewImage(input, previewId) {
            const preview = document.getElementById(previewId);
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => { preview.src = e.target.result; preview.classList.add('show'); };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function limparPreview(previewId) { const preview = document.getElementById(previewId); preview.src = ''; preview.classList.remove('show'); }
        function fecharModal() { document.getElementById('modalEditar').style.display = 'none'; }
        function fecharModalFora(e) { if (e.target.id === 'modalEditar') fecharModal(); }
        function mostrarToast(mensagem, tipo = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div'); toast.className = `toast ${tipo}`; toast.textContent = mensagem;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }
    </script>
</body>
</html>
